# ============================================================
# UDIIMS Test Profile — used by all JUnit / integration tests
# Spring auto-loads this when spring.profiles.active=test
# SupabaseService is mocked via @MockBean so these values
# are only needed to satisfy @Value injection at context load.
# ============================================================
server.port=8080
spring.application.name=udiims-backend-test

supabase.url=http://localhost:9999
supabase.anon-key=test-anon-key-for-unit-tests
supabase.service-key=test-service-key-for-unit-tests

logging.level.com.udiims=DEBUG
logging.level.org.springframework.test=INFO

# Disable DevTools banner in tests
spring.devtools.add-properties=false
